<!DOCTYPE html>
<html>
<head>
    <title>MatchDay Receiver</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" 
          content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; 
                   media-src * http: https: blob:;
                   connect-src * http: https: ws: wss:;">
    
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.6/shaka-player.compiled.js"></script>

    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        cast-media-player {
            width: 100%;
            height: 100%;
            --theme-hue: 220;
            --progress-color: #007AFF;
            --splash-image: none;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 100;
        }

        #overlay.visible {
            display: flex;
        }

        #app-logo {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -1px;
            color: #fff;
        }

        #app-logo span {
            color: #007AFF;
        }

        #status-text {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.7);
        }

        #channel-name {
            font-size: 28px;
            font-weight: 600;
            color: #fff;
        }

        #error-text {
            font-size: 18px;
            color: #FF3B30;
            display: none;
        }

        #live-badge {
            display: none;
            position: fixed;
            top: 24px;
            left: 24px;
            background: #FF3B30;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 4px;
            letter-spacing: 1px;
            z-index: 200;
        }

        #live-badge.visible {
            display: block;
        }

        #spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #007AFF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        #spinner.visible {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <cast-media-player></cast-media-player>

    <div id="live-badge">● LIVE</div>

    <div id="overlay" class="visible">
        <div id="app-logo">Match<span>Day</span></div>
        <div id="status-text">Ready to cast</div>
        <div id="channel-name"></div>
        <div id="spinner"></div>
        <div id="error-text"></div>
    </div>

    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        // UI elements
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status-text');
        const channelName = document.getElementById('channel-name');
        const spinner = document.getElementById('spinner');
        const errorText = document.getElementById('error-text');
        const liveBadge = document.getElementById('live-badge');

        // ─── Playback Config ──────────────────────────────────────────────
        const playbackConfig = new cast.framework.PlaybackConfig();

        // Use Shaka for HLS which handles CORS differently
        playbackConfig.factory = new cast.framework.ShakaFactory();

        playbackConfig.manifestRequestHandler = requestInfo => {
            requestInfo.withCredentials = false;
            console.log('MatchDay: Manifest request:', requestInfo.url);
            return requestInfo;
        };

        playbackConfig.segmentRequestHandler = requestInfo => {
            requestInfo.withCredentials = false;
            return requestInfo;
        };

        playbackConfig.autoResumeDuration = 5;
        playbackConfig.autoResumeNumberOfSegments = 1;

        // ─── Message Interceptors ─────────────────────────────────────────
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            loadRequestData => {
                const media = loadRequestData.media;
                console.log('MatchDay: Load request received');
                console.log('MatchDay: Content URL:', media.contentUrl);
                console.log('MatchDay: Content type:', media.contentType);
                console.log('MatchDay: Stream type:', media.streamType);

                if (!media || !media.contentUrl) {
                    console.error('MatchDay: No content URL');
                    return null;
                }

                const title = media.metadata && media.metadata.title
                    ? media.metadata.title
                    : 'Live Channel';

                showLoading(title);

                // Force correct content type for HLS
                media.contentType = 'application/x-mpegURL';

                // Force live stream type
                media.streamType = cast.framework.messages.StreamType.LIVE;

                // Disable credentials for HTTP streams
                loadRequestData.credentials = null;
                loadRequestData.credentialsType = null;

                // Jump to live edge
                loadRequestData.currentTime = -1;

                return loadRequestData;
            }
        );

        // ─── Player Event Listeners ───────────────────────────────────────
        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYER_LOAD_COMPLETE,
            () => {
                console.log('MatchDay: Player load complete');
                hideOverlay();
                showLiveBadge();
            }
        );

        playerManager.addEventListener(
            cast.framework.events.EventType.PLAYING,
            () => {
                console.log('MatchDay: Playing');
                hideOverlay();
                showLiveBadge();
            }
        );

        playerManager.addEventListener(
            cast.framework.events.EventType.BUFFERING,
            event => {
                console.log('MatchDay: Buffering:', event.isBuffering);
                if (event.isBuffering) {
                    showBuffering();
                } else {
                    hideOverlay();
                }
            }
        );

        playerManager.addEventListener(
            cast.framework.events.EventType.ERROR,
            event => {
                console.error('MatchDay: ERROR event');
                console.error('MatchDay: Error:', JSON.stringify(event));
                console.error('MatchDay: Detailed code:', event.detailedErrorCode);
                console.error('MatchDay: Error reason:', event.reason);
                showError('Stream error — code ' + (event.detailedErrorCode || event.error));

                // Auto retry after 5 seconds
                setTimeout(() => {
                    console.log('MatchDay: Retrying...');
                    playerManager.seek({ currentTime: -1 });
                    playerManager.play();
                }, 5000);
            }
        );

        playerManager.addEventListener(
            cast.framework.events.EventType.MEDIA_FINISHED,
            event => {
                console.log('MatchDay: Media finished:', event.endedReason);
                if (event.endedReason ===
                    cast.framework.events.EndedReason.ERROR) {
                    showError('Stream ended unexpectedly — retrying...');
                    setTimeout(() => {
                        playerManager.seek({ currentTime: -1 });
                        playerManager.play();
                    }, 3000);
                } else {
                    showIdle();
                }
            }
        );

        // Log all events except TIME_UPDATE for debugging
        playerManager.addEventListener(
            cast.framework.events.EventType.ALL,
            event => {
                if (event.type !== cast.framework.events.EventType.TIME_UPDATE) {
                    console.log('MatchDay: Event:', event.type, JSON.stringify(event));
                }
            }
        );

        // ─── UI Helpers ───────────────────────────────────────────────────
        function showLoading(title) {
            overlay.classList.add('visible');
            statusText.textContent = 'Loading stream...';
            channelName.textContent = title;
            spinner.classList.add('visible');
            errorText.style.display = 'none';
            liveBadge.classList.remove('visible');
        }

        function showBuffering() {
            overlay.classList.add('visible');
            statusText.textContent = 'Buffering...';
            spinner.classList.add('visible');
            errorText.style.display = 'none';
        }

        function showError(message) {
            overlay.classList.add('visible');
            statusText.textContent = '';
            spinner.classList.remove('visible');
            errorText.textContent = message;
            errorText.style.display = 'block';
            liveBadge.classList.remove('visible');
        }

        function showIdle() {
            overlay.classList.add('visible');
            statusText.textContent = 'Ready to cast';
            channelName.textContent = '';
            spinner.classList.remove('visible');
            errorText.style.display = 'none';
            liveBadge.classList.remove('visible');
        }

        function hideOverlay() {
            overlay.classList.remove('visible');
            spinner.classList.remove('visible');
        }

        function showLiveBadge() {
            liveBadge.classList.add('visible');
        }

        // ─── Start receiver ───────────────────────────────────────────────
        context.start({
            playbackConfig: playbackConfig,
            supportedCommands:
                cast.framework.messages.Command.ALL_BASIC_MEDIA |
                cast.framework.messages.Command.QUEUE_PREV |
                cast.framework.messages.Command.QUEUE_NEXT |
                cast.framework.messages.Command.STREAM_TRANSFER,
            touchScreenOptimizedApp: false
        });

        console.log('MatchDay: Receiver started');
    </script>
</body>
</html>
